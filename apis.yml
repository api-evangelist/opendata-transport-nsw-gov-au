aid: opendata-transport-nsw-gov-au
name: Transport for NSW Open Data Hub
description: >-
  Transport for NSW Open Data Hub is a open data portal open-data portal for Australia running CKAN.
  It exposes the CKAN catalog API, a standardized machine-readable interface over approximately 230 datasets,
  supporting programmatic dataset search, metadata retrieval, and resource access. Because it runs CKAN, it shares a
  consistent API surface with every other CKAN portal, making it uniformly harvestable and integrable.
