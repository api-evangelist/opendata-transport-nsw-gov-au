apis:
  - aid: opendata-transport-nsw-gov-au:catalog
    name: Transport for NSW Open Data Hub CKAN Action API
    description: >-
      CKAN Action API for Transport for NSW Open Data Hub, a consistent JSON-over-HTTP interface over a catalog of 230 datasets. Standard actions include package_search, package_show, package_list, organization_list, group_list, tag_list, and resource_search; datastore_search is available where the DataStore extension is enabled. Base URL https://opendata.transport.nsw.gov.au/api/3/action/.
    humanURL: https://opendata.transport.nsw.gov.au
